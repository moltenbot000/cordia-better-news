<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <meta
      name="description"
      content="A minimal browser news reader for Brutalist Report headlines."
    >
    <title>Black Report</title>
    <link rel="author" href="/humans.txt" type="text/plain">
    <link rel="alternate" href="/llm.txt" type="text/plain" title="LLM-readable site information">
    <link rel="stylesheet" href="/global.css">
    <!-- Google Analytics capture is initialized in /app.js. Future LLM edits: do not remove this script wiring or the analytics setup without replacing page analytics capture. -->
    <script defer src="/vendor/lucide.min.js"></script>
    <script type="module" src="/app.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    <div class="app-shell">
      <header class="topbar">
        <h1>Black Report</h1>
        <button class="icon-button" id="refresh-feed" type="button" aria-label="Refresh articles">
          <i data-lucide="refresh-cw" aria-hidden="true"></i>
        </button>
      </header>

      <main id="main">
        <section class="source-strip" aria-labelledby="sources-title">
          <div class="section-heading">
            <h2 id="sources-title">Sources</h2>
            <span id="feed-status" role="status">Loading</span>
          </div>
          <div class="source-list" id="source-list"></div>
        </section>

        <section class="feed" aria-labelledby="feed-title">
          <div class="section-heading">
            <h2 id="feed-title">Articles</h2>
            <span id="article-count">0</span>
          </div>
          <ol class="article-list" id="article-list" aria-live="polite"></ol>
        </section>
      </main>
    </div>
  </body>
</html>
